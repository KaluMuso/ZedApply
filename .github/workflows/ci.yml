name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# One job at a time in this workflow — reduces concurrent runner usage
# (helps when the account is near its Actions spending limit).
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install pip-audit
      - name: pip-audit (advisory)
        continue-on-error: true
        run: pip-audit -r requirements.txt
      - name: Run tests
        run: pytest tests/
        env:
          SUPABASE_URL: https://fake.supabase.co
          SUPABASE_KEY: fake-key
          GEMINI_API_KEY: fake-key
          OPENROUTER_API_KEY: fake-key
          JWT_SECRET: test-secret

  frontend-test:
    needs: backend-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: npm audit (advisory)
        continue-on-error: true
        run: npm audit --audit-level=high
      - name: Lint
        run: npm run lint
      - name: Detect coverage skip
        id: skip_cov
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            MSG="$(git log -1 --pretty=%B)"
          fi
          if echo "$MSG" | grep -q '\[skip-coverage\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Unit tests with coverage gate
        if: steps.skip_cov.outputs.skip != 'true'
        run: npm run test:coverage
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      - name: Unit tests (coverage skipped)
        if: steps.skip_cov.outputs.skip == 'true'
        run: npm test
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

  frontend-build:
    needs: frontend-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.zedcv.com/api/v1
          NEXT_PUBLIC_SUPABASE_URL: https://chnesgmcuxyhwhzomdov.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: fake-key

  backend-docker:
    needs: frontend-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          cd apps/backend
          docker build -t zed-cv-backend:latest .
