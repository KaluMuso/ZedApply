# Vitest gate for branch protection check "Frontend tests / vitest".
# CI workflow also runs npm test after lint; this job stays for the required check name.
name: Frontend tests

on:
  pull_request:
    paths:
      - "apps/frontend/**"
      - ".github/workflows/frontend_tests.yml"
      - ".github/workflows/ci.yml"
  push:
    branches: [master]
    paths:
      - "apps/frontend/**"

concurrency:
  group: frontend-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  vitest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json
      - name: Detect coverage skip
        id: skip_cov
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            MSG="$(git log -1 --pretty=%B)"
          fi
          if echo "$MSG" | grep -q '\[skip-coverage\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - run: npm ci
      - name: Unit tests with coverage gate
        if: steps.skip_cov.outputs.skip != 'true'
        run: npm run test:coverage
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      - name: Unit tests (coverage skipped)
        if: steps.skip_cov.outputs.skip == 'true'
        run: npm test
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      - name: Upload HTML coverage report
        if: steps.skip_cov.outputs.skip != 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-html
          path: apps/frontend/coverage/
          if-no-files-found: ignore
