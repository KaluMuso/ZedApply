events {
    worker_connections 1024;
}

http {
    # ── Rate limiting zone ──
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # ── Upstream backends ──
    upstream backend {
        server backend:8000;
    }

    upstream waha_admin {
        server waha:3000;
    }

    # ── Redirect HTTP → HTTPS ──
    server {
        listen 80;
        server_name api.zedcv.com;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS — API ──
    server {
        listen 443 ssl http2;
        server_name api.zedcv.com;

        ssl_certificate     /etc/letsencrypt/live/api.zedcv.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.zedcv.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # File upload limit (CV uploads up to 5MB)
        client_max_body_size 6M;

        # API routes
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Docs (optional — disable in hardened prod)
        location /docs {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        location /redoc {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }
    }

    # ── HTTPS — WAHA admin (restrict to your IP) ──
    server {
        listen 443 ssl http2;
        server_name waha.zedcv.com;

        ssl_certificate     /etc/letsencrypt/live/api.zedcv.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.zedcv.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # IMPORTANT: Replace with your actual IP for security
        # allow YOUR.IP.HERE;
        # deny all;

        location / {
            proxy_pass http://waha_admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
