openapi: 3.1.0
info:
  title: Zed CV API
  description: AI-powered job matching platform for Zambia
  version: 0.1.0
  contact:
    email: convergeozambia@gmail.com
servers:
  - url: http://localhost:8000/api/v1
    description: Local development
  - url: https://api.zedcv.com/api/v1
    description: Production

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ProblemDetail:
      type: object
      required: [type, title, status]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }

    OTPRequest:
      type: object
      required: [phone]
      properties:
        phone: { type: string, pattern: '^\+260[0-9]{9}$', example: "+260971234567" }

    OTPVerify:
      type: object
      required: [phone, code]
      properties:
        phone: { type: string, pattern: '^\+260[0-9]{9}$' }
        code: { type: string, minLength: 6, maxLength: 6 }

    AuthTokens:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        user_id: { type: string, format: uuid }

    UserProfile:
      type: object
      properties:
        id: { type: string, format: uuid }
        phone: { type: string }
        full_name: { type: string }
        email: { type: string, format: email }
        location: { type: string }
        years_experience: { type: integer, minimum: 0 }
        skills: { type: array, items: { type: string } }
        cv_uploaded: { type: boolean }
        subscription_tier: { type: string, enum: [mwana, mwezi, bwino] }
        role: { type: string, enum: [user, superadmin] }
        created_at: { type: string, format: date-time }

    UserProfileUpdate:
      type: object
      properties:
        full_name: { type: string }
        email: { type: string, format: email }
        location: { type: string }
        years_experience: { type: integer, minimum: 0 }

    UserPreferences:
      type: object
      properties:
        whatsapp_alerts: { type: boolean, default: true }
        language: { type: string, enum: [en, bem], default: en }

    UserPreferencesUpdate:
      type: object
      properties:
        whatsapp_alerts: { type: boolean }
        language: { type: string, enum: [en, bem] }

    ProfileDeleted:
      type: object
      properties:
        deleted: { type: boolean }
        user_id: { type: string, format: uuid }

    UserSkill:
      type: object
      required: [name]
      properties:
        name: { type: string, maxLength: 100 }
        proficiency:
          type: string
          enum: [beginner, intermediate, advanced, expert]
          default: intermediate
        source:
          type: string
          enum: [cv_parse, manual, assessment]
          default: manual

    UserSkillsList:
      type: object
      properties:
        skills:
          type: array
          items: { $ref: '#/components/schemas/UserSkill' }

    UserSkillCreate:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 100 }
        proficiency:
          type: string
          enum: [beginner, intermediate, advanced, expert]
          default: intermediate

    UserSkillUpdate:
      type: object
      required: [proficiency]
      properties:
        proficiency:
          type: string
          enum: [beginner, intermediate, advanced, expert]

    AdminStats:
      type: object
      properties:
        users_total: { type: integer }
        users_active_30d: { type: integer }
        subscriptions_active: { type: integer }
        subscriptions_paid: { type: integer }
        jobs_total: { type: integer }
        jobs_active: { type: integer }
        jobs_expired: { type: integer }
        matches_24h: { type: integer }
        matches_total: { type: integer }
        revenue_ngwee_30d: { type: integer }
        revenue_ngwee_total: { type: integer }

    AdminUserRow:
      type: object
      properties:
        id: { type: string, format: uuid }
        phone: { type: string }
        full_name: { type: string }
        location: { type: string }
        subscription_tier: { type: string, enum: [mwana, mwezi, bwino] }
        role: { type: string, enum: [user, superadmin] }
        matches_used: { type: integer }
        matches_limit: { type: integer }
        created_at: { type: string, format: date-time }

    AdminUserList:
      type: object
      properties:
        users: { type: array, items: { $ref: '#/components/schemas/AdminUserRow' } }
        total: { type: integer }
        page: { type: integer }
        per_page: { type: integer }
        pages: { type: integer }

    AdminJobRow:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        company: { type: string }
        location: { type: string }
        source: { type: string, enum: [manual, scraper, ocr, partner] }
        quality_score: { type: integer }
        is_active: { type: boolean }
        closing_date: { type: string, format: date }
        posted_at: { type: string, format: date-time }

    AdminJobList:
      type: object
      properties:
        jobs: { type: array, items: { $ref: '#/components/schemas/AdminJobRow' } }
        total: { type: integer }
        page: { type: integer }
        per_page: { type: integer }
        pages: { type: integer }

    BulkDeactivateRequest:
      type: object
      properties:
        job_ids: { type: array, items: { type: string, format: uuid }, maxItems: 500 }
        expired_only: { type: boolean, default: false }

    BulkDeactivateResponse:
      type: object
      properties:
        deactivated: { type: integer }

    AdminPaymentRow:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        user_phone: { type: string }
        amount: { type: integer, description: "ngwee" }
        currency: { type: string }
        payment_method: { type: string }
        provider: { type: string }
        status: { type: string }
        created_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time }

    AdminPaymentList:
      type: object
      properties:
        payments: { type: array, items: { $ref: '#/components/schemas/AdminPaymentRow' } }
        total: { type: integer }
        page: { type: integer }
        per_page: { type: integer }
        pages: { type: integer }
        total_completed_ngwee: { type: integer }

    CVUploadResponse:
      type: object
      properties:
        cv_id: { type: string, format: uuid }
        parsed_skills: { type: array, items: { type: string } }
        experience_summary: { type: string }
        parsing_confidence: { type: number, minimum: 0, maximum: 1 }

    CVGenerateRequest:
      type: object
      required: [job_id]
      properties:
        job_id: { type: string, format: uuid }
        style: { type: string, enum: [professional, modern, simple], default: professional }

    Job:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        company: { type: string }
        location: { type: string }
        description: { type: string }
        requirements: { type: array, items: { type: string } }
        skills_required: { type: array, items: { type: string } }
        salary_min: { type: integer }
        salary_max: { type: integer }
        apply_url: { type: string, format: uri }
        apply_email: { type: string, format: email }
        source: { type: string, enum: [manual, scraper, ocr, partner] }
        quality_score: { type: integer, minimum: 0, maximum: 100 }
        closing_date: { type: string, format: date }
        posted_at: { type: string, format: date-time }
        is_active: { type: boolean }

    JobCreate:
      type: object
      required: [title, description, source]
      properties:
        title: { type: string, minLength: 5 }
        company: { type: string }
        location: { type: string }
        description: { type: string, minLength: 20 }
        requirements: { type: array, items: { type: string } }
        skills_required: { type: array, items: { type: string } }
        salary_min: { type: integer }
        salary_max: { type: integer }
        apply_url: { type: string, format: uri }
        apply_email: { type: string, format: email }
        source: { type: string, enum: [manual, scraper, ocr, partner] }
        closing_date: { type: string, format: date }

    JobList:
      type: object
      properties:
        jobs: { type: array, items: { $ref: '#/components/schemas/Job' } }
        total: { type: integer }
        page: { type: integer }
        per_page: { type: integer }

    MatchResult:
      type: object
      properties:
        id: { type: string, format: uuid }
        job: { $ref: '#/components/schemas/Job' }
        score: { type: number, minimum: 0, maximum: 100 }
        vector_score: { type: number }
        skill_score: { type: number }
        bonus_score: { type: number }
        matched_skills: { type: array, items: { type: string } }
        missing_skills: { type: array, items: { type: string } }
        explanation: { type: string }
        created_at: { type: string, format: date-time }

    MatchList:
      type: object
      properties:
        matches: { type: array, items: { $ref: '#/components/schemas/MatchResult' } }
        remaining_quota: { type: integer }

    Subscription:
      type: object
      properties:
        id: { type: string, format: uuid }
        tier: { type: string, enum: [mwana, mwezi, bwino] }
        status: { type: string, enum: [active, expired, cancelled] }
        current_period_start: { type: string, format: date-time }
        current_period_end: { type: string, format: date-time }
        matches_used: { type: integer }
        matches_limit: { type: integer }

    PaymentInitiate:
      type: object
      required: [tier, payment_method]
      properties:
        tier: { type: string, enum: [mwezi, bwino] }
        payment_method: { type: string, enum: [mtn_money, airtel_money] }
        phone: { type: string, pattern: '^\+260[0-9]{9}$' }

    PaymentInitiateResponse:
      type: object
      properties:
        transaction_token: { type: string }
        payment_url: { type: string, format: uri }
        status: { type: string, enum: [pending, redirect] }

    CoverLetterRequest:
      type: object
      required: [job_id]
      properties:
        job_id: { type: string, format: uuid }
        tone: { type: string, enum: [formal, friendly, confident], default: formal }

    CoverLetterResponse:
      type: object
      properties:
        content: { type: string }
        word_count: { type: integer }

    HealthCheck:
      type: object
      properties:
        status: { type: string, enum: [healthy, degraded, unhealthy] }
        version: { type: string }
        supabase: { type: boolean }
        waha: { type: boolean }

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      tags: [System]
      responses:
        '200':
          description: Service status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthCheck' }

  /auth/otp/request:
    post:
      operationId: requestOTP
      summary: Request OTP via WhatsApp
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OTPRequest' }
      responses:
        '200': { description: OTP sent }
        '429': { description: Rate limited }

  /auth/otp/verify:
    post:
      operationId: verifyOTP
      summary: Verify OTP and get tokens
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OTPVerify' }
      responses:
        '200':
          description: Auth successful
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthTokens' }
        '401': { description: Invalid OTP }

  /profile:
    get:
      operationId: getProfile
      tags: [Profile]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserProfile' }
    patch:
      operationId: updateProfile
      tags: [Profile]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserProfileUpdate' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserProfile' }
    delete:
      operationId: deleteProfile
      summary: Hard-delete the caller's account and cascade-related rows
      tags: [Profile]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProfileDeleted' }

  /profile/preferences:
    get:
      operationId: getPreferences
      tags: [Profile]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserPreferences' }
    patch:
      operationId: updatePreferences
      tags: [Profile]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserPreferencesUpdate' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserPreferences' }

  /profile/skills:
    get:
      operationId: listSkills
      tags: [Profile]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserSkillsList' }
    post:
      operationId: addSkill
      tags: [Profile]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserSkillCreate' }
      responses:
        '201':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserSkillsList' }

  /profile/skills/{name}:
    parameters:
      - in: path
        name: name
        required: true
        schema: { type: string }
    patch:
      operationId: updateSkill
      tags: [Profile]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserSkillUpdate' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserSkillsList' }
        '404': { description: Skill not on profile }
    delete:
      operationId: removeSkill
      tags: [Profile]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserSkillsList' }
        '404': { description: Skill not found }

  /admin/stats:
    get:
      operationId: adminStats
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminStats' }
        '403': { description: Superadmin only }

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: per_page, in: query, schema: { type: integer, default: 25 } }
        - { name: search, in: query, schema: { type: string } }
        - { name: tier, in: query, schema: { type: string, enum: [mwana, mwezi, bwino] } }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminUserList' }
        '403': { description: Superadmin only }

  /admin/jobs:
    get:
      operationId: adminListJobs
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: per_page, in: query, schema: { type: integer, default: 25 } }
        - { name: expired, in: query, schema: { type: boolean } }
        - { name: is_active, in: query, schema: { type: boolean } }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminJobList' }
        '403': { description: Superadmin only }

  /admin/jobs/bulk-deactivate:
    post:
      operationId: adminBulkDeactivateJobs
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BulkDeactivateRequest' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BulkDeactivateResponse' }
        '403': { description: Superadmin only }

  /admin/payments:
    get:
      operationId: adminListPayments
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: per_page, in: query, schema: { type: integer, default: 25 } }
        - { name: status, in: query, schema: { type: string, enum: [pending, completed, failed, refunded] } }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminPaymentList' }
        '403': { description: Superadmin only }

  /cv/upload:
    post:
      operationId: uploadCV
      summary: Upload and parse a CV
      tags: [CV]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CVUploadResponse' }

  /cv/generate:
    post:
      operationId: generateCV
      tags: [CV]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CVGenerateRequest' }
      responses:
        '200': { description: Generated CV }
        '403': { description: Tier not sufficient }

  /jobs:
    get:
      operationId: listJobs
      tags: [Jobs]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: per_page, in: query, schema: { type: integer, default: 20 } }
        - { name: location, in: query, schema: { type: string } }
        - { name: search, in: query, schema: { type: string } }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/JobList' }
    post:
      operationId: createJob
      tags: [Jobs]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/JobCreate' }
      responses:
        '201':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Job' }

  /jobs/{job_id}:
    get:
      operationId: getJob
      tags: [Jobs]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: job_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Job' }

  /matches:
    get:
      operationId: getMatches
      tags: [Matching]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: min_score, in: query, schema: { type: number, default: 50 } }
        - { name: limit, in: query, schema: { type: integer, default: 10 } }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MatchList' }

  /matches/trigger:
    post:
      operationId: triggerMatching
      tags: [Matching]
      security: [{ bearerAuth: [] }]
      responses:
        '202': { description: Matching queued }

  /cover-letter/generate:
    post:
      operationId: generateCoverLetter
      tags: [Cover Letter]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CoverLetterRequest' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CoverLetterResponse' }
        '403': { description: Bwino tier required }

  /subscription:
    get:
      operationId: getSubscription
      tags: [Subscription]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Subscription' }

  /subscription/pay:
    post:
      operationId: initiatePayment
      tags: [Subscription]
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PaymentInitiate' }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaymentInitiateResponse' }

  /webhooks/dpo:
    post:
      operationId: dpoWebhook
      tags: [Webhooks]
      responses:
        '200': { description: Webhook processed }

  /webhooks/whatsapp:
    post:
      operationId: whatsappWebhook
      tags: [Webhooks]
      responses:
        '200': { description: Webhook processed }
